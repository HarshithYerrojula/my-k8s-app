stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t my-k8s-app:$CI_PIPELINE_ID .
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Simulating deployment..."
    - echo "Deploy stage complete"
  only:
    - main
